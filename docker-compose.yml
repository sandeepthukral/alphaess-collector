services:
  influxdb:
    image: influxdb:2
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-home}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-alphaess}
      DOCKER_INFLUXDB_INIT_RETENTION: "0" # infinite
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    ports:
      - "${INFLUX_PORT:-8086}:8086" # for local inspection / Grafana outside Docker
    volumes:
      - alphaess-influxdb-data:/var/lib/influxdb2
    networks:
      - alphaess-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build: ./collector
    restart: unless-stopped
    environment:
      ALPHAESS_APP_ID: ${ALPHAESS_APP_ID}
      ALPHAESS_APP_SECRET: ${ALPHAESS_APP_SECRET}
      ALPHAESS_SYS_SN: ${ALPHAESS_SYS_SN}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-home}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-alphaess}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Battery usable capacity (kWh) — used by pricing.py to express the daily
      # SoC change in kWh. Optional; leave blank to skip that indicator.
      BATTERY_CAPACITY_KWH: ${BATTERY_CAPACITY_KWH:-}
      # Optional Kuma "Push" monitor URL; unset = no heartbeat.
      HEARTBEAT_URL: ${HEARTBEAT_URL:-}
      # Keep in sync with the com.docker.network.driver.mtu driver_opt on
      # alphaess-net below. The collector warns at startup if the MTU it
      # actually has is larger, which catches the network having been created
      # before that cap was added.
      EXPECTED_MAX_MTU: ${EXPECTED_MAX_MTU:-1400}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - alphaess-net

  awtrix-pusher:
    build: ./awtrix-pusher
    restart: unless-stopped
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-home}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-alphaess}
      AWTRIX_HOST: ${AWTRIX_HOST}
      PUSH_INTERVAL_SECONDS: ${PUSH_INTERVAL_SECONDS:-30}
      STALE_AFTER_SECONDS: ${STALE_AFTER_SECONDS:-180}
      AWTRIX_ICON_SOC: ${AWTRIX_ICON_SOC:-}
      AWTRIX_ICON_PV: ${AWTRIX_ICON_PV:-}
      AWTRIX_ICON_GRID: ${AWTRIX_ICON_GRID:-}
      AWTRIX_ICON_LOAD: ${AWTRIX_ICON_LOAD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - alphaess-net

  grafana:
    image: grafana/grafana-oss:11.6.0
    restart: unless-stopped
    # Copies the dashboard JSON into the provisioning dir with the import
    # placeholder ${DS_ALPHAESS} resolved to the provisioned datasource uid,
    # then starts Grafana normally. Keeps grafana/alphaess-dashboard.json
    # import-compatible for setups with an existing Grafana (see DEPLOY.md).
    entrypoint:
      - /bin/sh
      - -c
      - >
        mkdir -p /var/lib/grafana/dashboards &&
        for f in /etc/grafana/dashboard-src/*.json; do
        sed 's/$${DS_ALPHAESS}/alphaess/g' "$$f"
        > /var/lib/grafana/dashboards/"$$(basename "$$f")";
        done &&
        exec /run.sh
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # ECharts panel used by the Energy Flow (Sankey) dashboard (not in core Grafana)
      GF_INSTALL_PLUGINS: volkovlabs-echarts-panel
      # Consumed by grafana/provisioning/datasources/influxdb.yml
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-home}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-alphaess}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - alphaess-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/alphaess-dashboard.json:/etc/grafana/dashboard-src/alphaess-dashboard.json:ro
      - ./grafana/alphaess-energy-flow.json:/etc/grafana/dashboard-src/alphaess-energy-flow.json:ro
      - ./grafana/alphaess-battery-savings.json:/etc/grafana/dashboard-src/alphaess-battery-savings.json:ro
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - alphaess-net

networks:
  alphaess-net:
    # Cap the bridge MTU to clear path-MTU limits on some hosts (e.g. Synology
    # NAS uplinks / VPN/PPPoE), where the default 1500 causes large TLS
    # handshake packets to the AlphaESS API to be dropped, surfacing as
    # intermittent "SSL: UNEXPECTED_EOF_WHILE_READING" errors in the collector.
    #
    # !! Changing anything under driver_opts requires `docker compose down`
    # followed by `up -d`. Compose only applies driver_opts when it CREATES a
    # network; if one with this name already exists it is reused as-is and
    # your edit is silently ignored -- no warning, no error. `up
    # --force-recreate` does NOT help: it recreates the container but
    # reattaches it to the existing network. Verify with
    #   docker compose exec collector cat /sys/class/net/eth0/mtu
    # The collector also logs its link MTU at startup and warns if it exceeds
    # EXPECTED_MAX_MTU (see collector/collector.py:check_mtu).
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  alphaess-influxdb-data:
  alphaess-grafana-data:
